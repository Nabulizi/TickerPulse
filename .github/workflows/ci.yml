name: CI

on:
  push:
  pull_request:

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile Python modules
        run: |
          python -m py_compile \
            app.py scraper.py ticker_extractor.py tickers_db.py \
            price_lookup.py market_data.py signals.py pipeline.py \
            store.py scheduler.py import_cookies.py scan.py

      - name: Run offline regression tests
        run: pytest -q test_*.py
